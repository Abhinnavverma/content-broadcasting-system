databases:
  - name: broadcasting_db
    databaseName: broadcasting
    user: admin
    plan: free

services:
  - type: web
    name: backend-assignment
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx node-pg-migrate -m dist/migrations up && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: broadcasting_db
          property: connectionString
          
      - key: PORT
        value: "3000"
        
      - key: JWT_SECRET
        sync: false
