databases:
  - name: broadcasting_db
    databaseName: broadcasting
    user: admin

services:
  - type: web
    name: backend-assignment
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run migrate && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: broadcasting_db
          property: connectionString
          
      - key: PORT
        value: "3000"
        
      - key: JWT_SECRET
        sync: false
